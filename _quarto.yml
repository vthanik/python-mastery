project:
  type: book
  output-dir: _book

engine: jupyter

book:
  title: "Python Mastery"
  reader-mode: true

  page-footer:
    left: |
      Distilled from David M. Beazley's *Python Distilled* (Addison-Wesley 2022) and Luciano Ramalho's *Fluent Python* (2e, O'Reilly Media 2022).
    right: |
      This book was built with <a href="https://quarto.org/">Quarto</a>.
  site-url: https://vthanik.github.io/python-mastery/
  repo-url: https://github.com/vthanik/python-mastery
  repo-branch: main
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - preface.qmd

    - part: foundations.qmd
      chapters:
        - how-python-thinks.qmd
        - values-and-variables.qmd
        - strings-and-text.qmd
        - control-flow-basics.qmd
        - collections-basics.qmd
        - functions-basics.qmd
        - errors-and-exceptions.qmd
        - files-and-io.qmd
        - classes-basics.qmd
        - modules-and-packages.qmd
        - standard-library-tour.qmd
        - writing-real-programs.qmd

    - part: data-structures.qmd
      chapters:
        - data-model.qmd
        - sequences.qmd
        - dicts-sets.qmd
        - unicode.qmd
        - dataclasses.qmd
        - references-mutability.qmd

    - part: functions.qmd
      chapters:
        - first-class-functions.qmd
        - type-hints.qmd
        - decorators.qmd
        - design-patterns.qmd

    - part: classes.qmd
      chapters:
        - pythonic-objects.qmd
        - sequence-methods.qmd
        - protocols-abcs.qmd
        - inheritance.qmd
        - advanced-typing.qmd

    - part: control-flow.qmd
      chapters:
        - operator-overload.qmd
        - iterators.qmd
        - with-match-else.qmd
        - concurrency.qmd
        - executors.qmd
        - async.qmd

    - part: metaprogramming.qmd
      chapters:
        - dynamic-attrs.qmd
        - descriptors.qmd
        - metaclasses.qmd

    - references.qmd

bibliography: references.bib
csl: chicago-fullnote-bibliography.csl

format:
  html:
    theme:
      - cosmo
    css: style.css
    code-link: true
    callout-appearance: simple
    fig-align: center

editor: visual
